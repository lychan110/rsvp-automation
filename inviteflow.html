<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InviteFlow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c10;color:#c9d1d9;font-family:'DM Mono','Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#21262d;border-radius:3px}
.btn{border:1px solid #21262d;background:#0d1117;color:#8b949e;padding:6px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:.05em;transition:all .15s}
.btn:hover{border-color:#58a6ff;color:#58a6ff}
.btn.pri{background:#1f6feb;border-color:#1f6feb;color:#fff}.btn.pri:hover{background:#388bfd}
.btn.grn{background:#238636;border-color:#238636;color:#fff}.btn.grn:hover{background:#2ea043}
.btn.gold{background:#3d2800;border-color:#C8A84B;color:#C8A84B}.btn.gold:hover{background:#C8A84B;color:#000}
.btn.sm{padding:4px 9px;font-size:10px}
.btn.stop{border-color:#da3633;color:#f85149}.btn.stop:hover{background:#da3633;color:#fff}
.btn:disabled{opacity:.35;cursor:not-allowed}
.tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:.07em;border:1px solid}
.cat{border:1px solid #21262d;background:transparent;color:#6e7681;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:10px;transition:all .15s}
.cat.on{border-color:#C8A84B;color:#C8A84B;background:#2a1a00}.cat:hover:not(.on){color:#c9d1d9;border-color:#30363d}
input[type=checkbox]{accent-color:#C8A84B}
.ifield{background:#0d1117;border:1px solid #21262d;color:#c9d1d9;padding:6px 10px;border-radius:5px;font-family:inherit;font-size:11px;outline:none;width:100%;transition:border-color .15s}
.ifield:focus{border-color:#C8A84B}
.ritem{transition:background .1s;cursor:pointer}.ritem:hover{background:#0d1117}
.card{background:#0d1117;border:1px solid #21262d;border-radius:7px;padding:14px 16px;margin-bottom:10px}
.sl{font-size:9px;color:#6e7681;letter-spacing:.12em;margin-bottom:7px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#0d1117;border:1px solid #21262d;border-radius:8px;width:540px;max-height:82vh;overflow-y:auto;padding:22px 26px}
</style>
</head>
<body>
<div id="root" style="display:flex;flex-direction:column;height:100vh;overflow:hidden"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════════════
// IMAGES
// Architecture: template uses named tokens (__IMG_EMBLEM__ etc.), images live
// here as named constants. Token replacement happens at render time. This keeps
// templates readable and images easily swappable without touching template HTML.
// ═══════════════════════════════════════════════════════════════════════════════
const IMAGES = {
  EMBLEM:    '',
  LOGO:      '',
  SIGNATURE: '',
};

// Override any image with a hosted URL (Google Drive / direct URL).
// Format: { EMBLEM: "https://...", LOGO: "", SIGNATURE: "" }
// Empty string = fall back to embedded base64 above.
let IMAGE_OVERRIDES = { EMBLEM:"", LOGO:"", SIGNATURE:"" };

function img(key) {
  const override = IMAGE_OVERRIDES[key];
  if (override) {
    if (IMAGE_OVERRIDES[key+'_mode'] === 'gdrive')
      return 'https://drive.google.com/uc?export=view&id=' + override.trim();
    return override.trim();
  }
  return IMAGES[key];
}

// ═══════════════════════════════════════════════════════════════════════════════
// EMAIL TEMPLATE
// Clean readable HTML using named tokens: __IMG_EMBLEM__, __IMG_LOGO__,
// __IMG_SIGNATURE__, {{FirstName}}, {{LastName}}, {{Date_Sent}}, {{RSVP_Link}}
// ═══════════════════════════════════════════════════════════════════════════════
const EMAIL_TEMPLATE = `
<div style="width:100%;max-width:680px;min-width:280px;margin:0 auto;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;background:#ffffff">

  <!-- Top border -->
  <div style="background:#8B1A1A;height:5px"></div>
  <div style="background:linear-gradient(90deg,#8B1A1A 0%,#C8A84B 50%,#8B1A1A 100%);height:1px"></div>

  <!-- Header -->
  <div style="background:#0d0d0d;padding:32px 44px 26px;text-align:center">
    <img src="__IMG_EMBLEM__" alt="Event Emblem"
      style="width:180px;max-width:180px;height:auto;display:inline-block;margin-bottom:18px">

    <div style="color:#C8A84B;font-size:9px;letter-spacing:5px;font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:10px">
      {{OrgName}}
    </div>

    <div style="background:linear-gradient(90deg,transparent,#C8A84B,transparent);height:1px;margin:0 40px 14px"></div>

    <div style="color:#f5ede0;font-size:22px;font-weight:normal;line-height:1.35;letter-spacing:.5px">
      {{FullTitle}}
    </div>

    <div style="color:#C8A84B;font-size:10px;letter-spacing:4px;font-family:Arial,sans-serif;margin-top:10px;text-transform:uppercase">
      {{EventName}} &nbsp;&middot;&nbsp; {{EventDate}}
    </div>

    <div style="background:linear-gradient(90deg,transparent,#C8A84B,transparent);height:1px;margin:14px 40px 0"></div>
  </div>

  <!-- Thin gold rule replacing the "FORMAL VIP INVITATION" band -->
  <div style="background:#8B1A1A;height:3px"></div>

  <!-- Body -->
  <div style="padding:40px 48px 32px;background:#fffdf8">

    <p style="font-size:13px;color:#777;font-family:Arial,sans-serif;margin:0 0 22px">
      {{Date_Sent}}
    </p>

    <p style="font-size:15px;margin:0 0 22px;color:#1a1a1a;line-height:1.5">
      Dear Honorable {{FirstName}} {{LastName}},
    </p>

    <p style="font-size:14px;line-height:1.9;margin:0 0 18px;color:#2c2c2c">
      On behalf of <strong>{{OrgName}}</strong>, we respectfully invite you to
      <strong>{{EventName}}</strong> — <strong>{{FullTitle}}</strong> — on
      <strong>{{EventDate}}</strong>,
      at <strong>{{Venue}}</strong>.
    </p>

    <p style="font-size:14px;line-height:1.9;margin:0 0 18px;color:#2c2c2c">
      We would be deeply honored to welcome you as our distinguished guest.
      The VIP program — including the Opening Ceremony and Reception —
      is scheduled from <strong>{{VIPStart}} until {{VIPEnd}}</strong>,
      featuring cultural stage performances and community festivities.
      This celebration brings together thousands of Triangle residents
      to enjoy dragon boat racing, vibrant cultural performances,
      and the culinary traditions of Asia's diverse communities.
    </p>

    <!-- Pull quote — restrained gold left-border style -->
    <div style="border-left:2px solid #C8A84B;margin:24px 0;padding:12px 20px;background:#fff8ee">
      <p style="font-size:13px;color:#8B1A1A;font-style:italic;line-height:1.8;margin:0">
        Dragon boat festivals draw hundreds of thousands of spectators worldwide.
        The Greater Triangle festival has grown to an estimated attendance of
        <strong>10,000</strong>, reflecting the region's vibrant and engaged Asian community.
        Additional details are available at
        <a href="{{EventUrl}}" style="color:#8B1A1A;text-decoration:underline">{{EventUrl}}</a>.
      </p>
    </div>

    <p style="font-size:14px;line-height:1.9;margin:0 0 28px;color:#2c2c2c">
      To assist us in preparing the Opening Ceremony, we respectfully request
      your RSVP at your earliest convenience. Should you be unable to attend
      in person, you are most welcome to send a representative. A congratulatory
      letter commemorating this occasion would likewise be sincerely appreciated.
    </p>

    <!-- RSVP button -->
    <div style="text-align:center;margin:30px 0 22px">
      <a href="{{RSVP_Link}}"
        style="display:inline-block;background:#8B1A1A;color:#f5ede0;text-decoration:none;
               padding:15px 48px;font-family:Arial,sans-serif;font-size:12px;
               letter-spacing:3px;text-transform:uppercase;
               border:1px solid #C8A84B">
        RSVP &nbsp;&middot;&nbsp; Reserve Your Place
      </a>
      <div style="margin-top:10px;font-size:11px;color:#aaa;font-family:Arial,sans-serif">
        or reply directly to this email
      </div>
    </div>

    <p style="font-size:13px;line-height:1.8;color:#555;font-family:Arial,sans-serif;margin:24px 0 0">
      For inquiries, please contact <strong>{{ContactName}}</strong>,
      {{ContactTitle}}, at
      <a href="mailto:{{ContactEmail}}" style="color:#8B1A1A;text-decoration:underline">{{ContactEmail}}</a>.
      They will be pleased to follow up with your office to confirm your attendance.
    </p>
  </div>

  <!-- Gold rule -->
  <div style="background:linear-gradient(90deg,transparent,#C8A84B,transparent);height:1px;margin:0 48px"></div>

  <!-- Signature block — IMG_LOGO is actually the signature image (small, 4KB) -->
  <div style="padding:28px 48px 32px;background:#fffdf8">
    <p style="font-size:14px;line-height:1.7;margin:0 0 16px;color:#2c2c2c">
      We look forward to your presence at this important cultural celebration.
    </p>
    <p style="font-size:14px;margin:0 0 10px;color:#2c2c2c">Respectfully yours,</p>
    <!-- FIXED: __IMG_LOGO__ = small 4KB image = actual handwritten signature -->
    <img src="__IMG_LOGO__" alt="Signature"
      style="width:180px;max-width:180px;height:auto;display:block;margin:8px 0 0">
  </div>

  <!-- Footer — IMG_SIGNATURE = large 190KB image = org logo/letterhead -->
  <div style="background:linear-gradient(90deg,transparent,#C8A84B,transparent);height:1px"></div>
  <div style="background:#0d0d0d;padding:20px 36px">
    <table style="width:100%;border-collapse:collapse">
      <tr>
        <td style="vertical-align:middle;width:140px;padding:0">
          <!-- FIXED: __IMG_SIGNATURE__ = large 190KB image = org footer/logo -->
          <img src="__IMG_SIGNATURE__" alt="{{OrgName}}"
            style="width:120px;height:auto;display:block">
        </td>
        <td style="vertical-align:middle;padding:0 0 0 16px">
          <div style="color:#C8A84B;font-size:10px;font-family:Arial,sans-serif;letter-spacing:2px;text-transform:uppercase">
            {{OrgName}}
          </div>
          <div style="color:#666;font-size:10px;font-family:Arial,sans-serif;margin-top:4px;line-height:1.6">
            {{OrgLocation}}
          </div>
          <a href="https://AsianFocusNC.org"
            style="color:#C8A84B;font-size:10px;font-family:Arial,sans-serif;text-decoration:none;display:block;margin-top:3px">
            AsianFocusNC.org
          </a>
        </td>
      </tr>
    </table>
  </div>
  <div style="background:linear-gradient(90deg,#8B1A1A 0%,#C8A84B 50%,#8B1A1A 100%);height:1px"></div>
  <div style="background:#8B1A1A;height:4px"></div>
</div>
`;

function buildEmail(firstName, lastName, event) {
  const E = event || S.event;
  return EMAIL_TEMPLATE
    .replace(/__IMG_EMBLEM__/g,    img('EMBLEM'))
    .replace(/__IMG_LOGO__/g,      img('LOGO'))
    .replace(/__IMG_SIGNATURE__/g, img('SIGNATURE'))
    .replace(/\{\{Date_Sent\}\}/g,   E.sentDate || '')
    .replace(/\{\{FirstName\}\}/g,   firstName  || '')
    .replace(/\{\{LastName\}\}/g,    lastName   || '')
    .replace(/\{\{RSVP_Link\}\}/g,   E.rsvpLink || '#');
}

// ═══════════════════════════════════════════════════════════════════════════════
// PREVIEW — write directly to iframe document (no blob URL, no race condition)
// ═══════════════════════════════════════════════════════════════════════════════
function writePreview(html, frameId) {
  const frame = document.getElementById(frameId || 'preview-frame');
  if (!frame) { console.warn('preview frame not found:', frameId); return; }
  try {
    frame.contentDocument.open();
    frame.contentDocument.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0}</style></head><body>' + html + '</body></html>');
    frame.contentDocument.close();
  } catch(e) {
    console.error('preview write failed:', e);
  }
}

function downloadHtml(inv, html) {
  const a = document.createElement('a');
  const blob = new Blob(['<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + html + '</body></html>'], {type:'text/html'});
  a.href = URL.createObjectURL(blob);
  a.download = 'invite_' + inv.name.replace(/[^a-z0-9]/gi,'_') + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

// ═══════════════════════════════════════════════════════════════════════════════
// DEFAULTS & STATE
// ═══════════════════════════════════════════════════════════════════════════════
const DEFAULT_EVENT = {
  profileName:  '',
  eventName:    '',
  fullTitle:    '',
  eventDate:    '',
  venue:        '',
  vipStart:     '', vipEnd: '',
  rsvpLink:     '',
  org:          '',
  contactName:  '',
  contactTitle: '',
  contactEmail: '',
  emailSubject: '',
  sheetId:      '',
  orgLocation:  '',
  sentDate:     new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
  // Image overrides per event (empty = use embedded base64)
  imgEmblemMode:'embedded', imgEmblemUrl:'',
  imgLogoMode:  'embedded', imgLogoUrl:  '',
  imgSigMode:   'embedded', imgSigUrl:   '',
};

const S = {
  tab: 0, modal: null,
  event: {...DEFAULT_EVENT},
  invitees: [],
  inviteFilter: 'all',
  previewName: null,
  unsaved: false,
  log: [],
};

// Apply image overrides from event config whenever event changes
function syncImageOverrides() {
  IMAGE_OVERRIDES = {
    EMBLEM:    S.event.imgEmblemUrl  || '',
    LOGO:      S.event.imgLogoUrl    || '',
    SIGNATURE: S.event.imgSigUrl     || '',
    EMBLEM_mode:    S.event.imgEmblemMode  || 'embedded',
    LOGO_mode:      S.event.imgLogoMode    || 'embedded',
    SIGNATURE_mode: S.event.imgSigMode     || 'embedded',
  };
}
syncImageOverrides();

// ═══════════════════════════════════════════════════════════════════════════════
// PROFILE: JSON export/import only — no localStorage
// ═══════════════════════════════════════════════════════════════════════════════
function exportProfile() {
  const out = {
    schema: 'vip-mailer-profile-v1',
    exportedAt: new Date().toISOString(),
    event: {...S.event},
    invitees: S.invitees.map(i => ({...i})),
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(out,null,2)], {type:'application/json'}));
  a.download = 'vip-mailer-' + S.event.profileName.replace(/[^a-z0-9]/gi,'-') + '-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  S.unsaved = false; log('✓ Profile exported.'); render();
}

function importProfile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.event)    S.event    = {...DEFAULT_EVENT, ...d.event};
      if (d.invitees) S.invitees = d.invitees.map(i => ({...i, inviteStatus: i.inviteStatus||'not_sent'}));
      syncImageOverrides();
      S.unsaved = false; S.modal = null;
      log('✓ Profile loaded: ' + S.event.profileName + ' (' + S.invitees.length + ' invitees)');
      render();
    } catch(err) { log('✗ Import failed: ' + err.message); }
  };
  r.readAsText(file);
}

// ─── Researcher connector ────────────────────────────────────────────────────
function importResearcher(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      const list = (d.invitees || d).filter(x => x.name && x.verifyStatus !== 'left_office');
      let added = 0, updated = 0;
      list.forEach(x => {
        const email = x.email || x.officeEmail || x.directEmail || '';
        const ex = S.invitees.find(i => i.name === x.name);
        if (ex) {
          ex.email    = email || ex.email;
          ex.title    = x.title    || ex.title;
          ex.category = x.category || ex.category;
          updated++;
        } else {
          S.invitees.push({name:x.name, title:x.title||'', category:x.category||'',
            email, inviteStatus:'not_sent', sentAt:'', notes:''});
          added++;
        }
      });
      S.unsaved = true; S.modal = null;
      log('✓ Researcher import: +' + added + ' new, ' + updated + ' updated. Total: ' + S.invitees.length);
      render();
    } catch(err) { log('✗ Import failed: ' + err.message); }
  };
  r.readAsText(file);
}

function importCSV(file) {
  const r = new FileReader();
  r.onload = e => {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    const hdr = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());
    let added = 0;
    lines.slice(1).forEach(line => {
      const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
      const row  = {}; hdr.forEach((h,i) => row[h] = (cols[i]||'').replace(/"/g,'').trim());
      const name = row.name || row['full name'] || ''; if (!name) return;
      const email = row.email || row['office email'] || row['direct email'] || '';
      if (!S.invitees.find(i => i.name === name)) {
        S.invitees.push({name, title:row.title||'', category:row.category||'',
          email, inviteStatus:'not_sent', sentAt:'', notes:''});
        added++;
      }
    });
    S.unsaved = true; S.modal = null;
    log('✓ CSV: +' + added + ' added. Total: ' + S.invitees.length);
    render();
  };
  r.readAsText(file);
}

// ─── Gmail ───────────────────────────────────────────────────────────────────
function openGmail(inv) {
  const p = inv.name.split(' ');
  const html = buildEmail(p[0], p[p.length-1]);
  const to  = encodeURIComponent(inv.email || '');
  const sub = encodeURIComponent(S.event.emailSubject || 'VIP Invitation');
  window.open('https://mail.google.com/mail/?view=cm&fs=1&to=' + to + '&su=' + sub, '_blank');
  downloadHtml(inv, html);
  const idx = S.invitees.findIndex(i => i.name === inv.name);
  if (idx >= 0) { S.invitees[idx].inviteStatus = 'sent'; S.invitees[idx].sentAt = new Date().toISOString(); }
  S.unsaved = true; log('✉ Gmail opened + HTML saved for ' + inv.name); render();
}

function downloadAll() {
  const t = S.invitees.filter(i => i.email && i.inviteStatus !== 'skipped');
  t.forEach((inv, i) => setTimeout(() => {
    const p = inv.name.split(' ');
    downloadHtml(inv, buildEmail(p[0], p[p.length-1]));
  }, i * 250));
  log('↓ Downloading ' + t.length + ' invite HTMLs…');
}

function exportCSV() {
  const h = ['Name','Title','Category','Email','Invite Status','Sent At','Notes'];
  const rows = S.invitees.map(i => [i.name,i.title||'',i.category||'',i.email||'',i.inviteStatus||'not_sent',i.sentAt||'',i.notes||'']);
  const csv = [h,...rows].map(r => r.map(c => '"' + (c||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'vip-mailer-' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
  log('✓ CSV exported.');
}

function updInvitee(name, patch) {
  const i = S.invitees.findIndex(x => x.name === name);
  if (i >= 0) Object.assign(S.invitees[i], patch);
  S.unsaved = true; render();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function log(m) { S.log = ['[' + new Date().toLocaleTimeString() + '] ' + m, ...S.log.slice(0,99)]; renderLog(); }
function triggerFile(handler, accept) {
  const f = document.createElement('input'); f.type='file'; f.accept=accept||'*';
  f.onchange = e => handler(e.target.files[0]); f.click();
}
function testImg(key) {
  const src = img(key);
  if (src.startsWith('data:')) { log('✓ ' + key + ': embedded OK'); return; }
  const el = new Image();
  el.onload  = () => log('✓ ' + key + ': loaded OK');
  el.onerror = () => log('✗ ' + key + ': FAILED — check URL and sharing settings');
  el.src = src; log('Testing ' + key + '…');
}
const ITAG = {not_sent:'#30363d:#6e7681', sent:'#238636:#3fb950', skipped:'#bb8009:#e3b341', bounced:'#da3633:#f85149'};
const IL   = {not_sent:'NOT SENT', sent:'SENT', skipped:'SKIPPED', bounced:'BOUNCED'};
function its(k) { const[b,c]=(ITAG[k]||ITAG.not_sent).split(':'); return 'border-color:'+b+';color:'+c; }

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function render() {
  const we = S.invitees.filter(i=>i.email).length;
  const sent = S.invitees.filter(i=>i.inviteStatus==='sent').length;
  const pending = S.invitees.filter(i=>i.inviteStatus==='not_sent'&&i.email).length;

  document.getElementById('root').innerHTML = `
  <div style="border-bottom:1px solid #21262d;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#080c10">
    <div style="display:flex;align-items:center;gap:10px">
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#f0f6fc;letter-spacing:-.02em">VIP MAILER</div>
        <div style="font-size:9px;color:#6e7681;letter-spacing:.1em">${S.event.profileName||'Untitled'}</div>
      </div>
      <div style="border-left:1px solid #21262d;padding-left:10px;display:flex;gap:5px;align-items:center">
        ${S.unsaved?'<span style="background:#2a1a00;border:1px solid #C8A84B;border-radius:4px;padding:2px 8px;font-size:9px;color:#C8A84B">● UNSAVED</span>':''}
        <button class="btn sm gold" onclick="exportProfile()">↓ Save JSON</button>
        <button class="btn sm" onclick="triggerFile(importProfile,'.json')">↑ Load Profile</button>
        <button class="btn sm" onclick="S.modal='new';render()">＋ New</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <span style="font-size:10px;color:#6e7681">${S.invitees.length} invitees · ${sent} sent</span>
      <button class="btn sm" onclick="exportCSV()">↓ CSV</button>
      ${S.event.sheetId?`<button class="btn sm" onclick="window.open('https://docs.google.com/spreadsheets/d/${S.event.sheetId}/edit','_blank')">⬡ Sheet</button>`:''}
    </div>
  </div>

  <div style="padding:5px 20px;border-bottom:1px solid #161b22;display:flex;gap:12px;flex-wrap:wrap;align-items:center;flex-shrink:0">
    ${[['TOTAL',S.invitees.length,'#8b949e'],['W/EMAIL',we,'#a371f7'],['PENDING',pending,'#58a6ff'],['SENT',sent,'#3fb950'],['SKIPPED',S.invitees.filter(i=>i.inviteStatus==='skipped').length,'#e3b341']].map(([l,n,c])=>`
    <div style="display:flex;align-items:center;gap:4px">
      <span style="width:5px;height:5px;border-radius:50%;background:${c};display:inline-block"></span>
      <span style="font-size:9px;color:#6e7681;letter-spacing:.1em">${l}</span>
      <span style="font-size:12px;font-weight:500;color:${c}">${n}</span>
    </div>`).join('')}
  </div>

  <div style="border-bottom:1px solid #21262d;display:flex;flex-shrink:0">
    ${['✉  Invite','⚙  Settings','👥  Invitees'].map((t,i)=>`
    <button onclick="S.tab=${i};render()" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:.04em;padding:8px 15px;color:${S.tab===i?'#f0f6fc':'#6e7681'};border-bottom:${S.tab===i?'2px solid #C8A84B':'2px solid transparent'}">${t}</button>`).join('')}
  </div>

  <div style="display:grid;grid-template-columns:1fr 210px;flex:1;overflow:hidden;min-height:0">
    <div style="overflow-y:auto;min-height:0">${S.tab===0?renderInvite():S.tab===1?renderSettings():renderInvitees()}</div>
    <div style="overflow-y:auto;padding:11px 12px;background:#050709;border-left:1px solid #161b22;min-height:0" id="logpanel">
      <div style="font-size:9px;color:#6e7681;letter-spacing:.14em;margin-bottom:6px">ACTIVITY LOG</div>
      ${S.log.length===0?'<div style="font-size:10px;color:#21262d;font-style:italic">No activity…</div>':''}
      ${S.log.map((e,i)=>`<div style="font-size:10px;color:${i===0?'#8b949e':'#2d3340'};margin-bottom:3px;line-height:1.5;border-left:${i===0?'2px solid #C8A84B':'2px solid transparent'};padding-left:6px">${e}</div>`).join('')}
    </div>
  </div>
  ${renderModal()}
  `;

  // Populate previews AFTER DOM is updated
  if (S.tab === 0 && S.previewName) refreshInvitePreview();
}

function renderLog() {
  const el = document.getElementById('logpanel'); if (!el) return;
  el.innerHTML = '<div style="font-size:9px;color:#6e7681;letter-spacing:.14em;margin-bottom:6px">ACTIVITY LOG</div>' +
    S.log.map((e,i)=>`<div style="font-size:10px;color:${i===0?'#8b949e':'#2d3340'};margin-bottom:3px;line-height:1.5;border-left:${i===0?'2px solid #C8A84B':'2px solid transparent'};padding-left:6px">${e}</div>`).join('');
}

function refreshInvitePreview() {
  const inv = S.invitees.find(x => x.name === S.previewName); if (!inv) return;
  const p = inv.name.split(' ');
  writePreview(buildEmail(p[0], p[p.length-1]), 'preview-frame');
}

// ─── Tab: Invite ─────────────────────────────────────────────────────────────
function renderInvite() {
  const display = S.invitees.filter(i => {
    if (S.inviteFilter==='all')      return true;
    if (S.inviteFilter==='pending')  return i.inviteStatus==='not_sent' && i.email;
    if (S.inviteFilter==='no_email') return !i.email;
    return i.inviteStatus === S.inviteFilter;
  });
  const hp = !!S.previewName;
  return `<div style="display:grid;grid-template-columns:${hp?'280px 1fr':'1fr'};height:100%;overflow:hidden">
    <div style="overflow-y:auto${hp?';border-right:1px solid #21262d':''}">
      <div style="padding:7px 14px;border-bottom:1px solid #161b22;display:flex;gap:4px;flex-wrap:wrap;position:sticky;top:0;background:#080c10;z-index:2">
        ${['all','pending','sent','skipped','no_email'].map(f=>`<button class="cat${S.inviteFilter===f?' on':''}" onclick="S.inviteFilter='${f}';render()">${f.replace('_',' ').toUpperCase()}</button>`).join('')}
      </div>
      <div style="padding:5px 14px;border-bottom:1px solid #161b22;display:flex;gap:5px">
        <button class="btn sm gold" onclick="downloadAll()">↓ All HTMLs</button>
        <button class="btn sm" onclick="previewSample()">Preview Template</button>
      </div>
      ${display.map(inv => {
        const active = S.previewName === inv.name;
        const esc = inv.name.replace(/'/g,"\\'");
        return `
        <div class="ritem" style="display:grid;grid-template-columns:1fr 60px 80px;gap:5px;padding:8px 14px;border-bottom:1px solid #0d1117;background:${active?'#1a0f00':'transparent'}" onclick="previewInvitee('${esc}')">
          <div>
            <div style="font-size:11px;font-weight:500;color:#f0f6fc">${inv.name}</div>
            <div style="font-size:9px;color:#6e7681;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${inv.title?inv.title+' · ':''}${inv.email||'<span style="color:#da3633">no email</span>'}</div>
          </div>
          <div style="padding-top:1px"><span class="tag" style="${its(inv.inviteStatus)};font-size:8px">${IL[inv.inviteStatus]||'NOT SENT'}</span></div>
          <div style="display:flex;flex-direction:column;gap:3px">
            ${inv.email?`<button class="btn sm gold" onclick='event.stopPropagation();openGmail(${JSON.stringify(inv)})' style="font-size:9px;padding:2px 5px">✉ Send</button>`:''}
            <button class="btn sm" onclick='event.stopPropagation();updInvitee("${inv.name.replace(/"/g,'\\"')}",{inviteStatus:${inv.inviteStatus==="skipped"?'"not_sent"':'"skipped"'}})' style="font-size:9px;padding:2px 5px;color:#6e7681">${inv.inviteStatus==='skipped'?'↩':'Skip'}</button>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${hp?`
    <div style="display:flex;flex-direction:column;overflow:hidden">
      <div style="background:#080c10;padding:7px 13px;border-bottom:1px solid #21262d;display:flex;gap:7px;align-items:center;flex-shrink:0">
        <div style="font-size:11px;color:#f0f6fc;font-weight:500">${S.previewName}</div>
        <button class="btn sm gold" style="margin-left:auto" onclick='openGmail(${JSON.stringify(S.invitees.find(x=>x.name===S.previewName)||{})})'>✉ Send via Gmail</button>
        <button class="btn sm" onclick="S.previewName=null;render()">✕</button>
      </div>
      <iframe id="preview-frame" style="flex:1;border:none;background:#fff"></iframe>
    </div>`:
    `<div style="display:flex;align-items:center;justify-content:center;color:#21262d;font-size:12px;font-style:italic">← Click an invitee to preview</div>`}
  </div>`;
}

function previewInvitee(name) {
  S.previewName = name; render(); // render creates the iframe, then:
  requestAnimationFrame(refreshInvitePreview); // write after DOM settles
}

function previewSample() {
  S.previewName = '__sample__'; render();
  requestAnimationFrame(() => {
    writePreview(buildEmail('Sample','Official'), 'preview-frame');
  });
}

// ─── Tab: Settings ────────────────────────────────────────────────────────────
function renderSettings() {
  const e = S.event;
  const ml = {embedded:'Embedded (base64)', gdrive:'Google Drive ID', url:'Direct URL'};
  const imgDefs = [
    {key:'Emblem',  label:'Header Emblem',   hint:'Main dragon boat / event image'},
    {key:'Logo',    label:'Footer Logo',     hint:'Small org logo'},
    {key:'Sig',     label:'Signature',       hint:'Signature + footer graphic'},
  ];
  return `<div style="padding:16px 22px;max-width:600px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:12px;color:#f0f6fc">Event Configuration</div>
      <button class="btn sm gold" onclick="exportProfile()">↓ Save Profile JSON</button>
    </div>

    <div class="sl">EVENT DETAILS</div>
    <div class="card">
      ${[['Profile Name','profileName'],['Event Display Name','eventName'],['Full Title','fullTitle'],
         ['Date','eventDate'],['Venue','venue'],['VIP Start','vipStart'],['VIP End','vipEnd']].map(([lbl,key])=>`
      <div style="margin-bottom:9px">
        <div style="font-size:9px;color:#6e7681;margin-bottom:3px">${lbl}</div>
        <input class="ifield" type="text" value="${(e[key]||'').replace(/"/g,'&quot;')}" oninput="S.event['${key}']=this.value;S.unsaved=true">
      </div>`).join('')}
    </div>

    <div class="sl">EMAIL</div>
    <div class="card">
      ${[['RSVP Link','rsvpLink'],['Email Subject','emailSubject'],['Org Name','org'],
         ['Contact Name','contactName'],['Contact Title','contactTitle'],['Contact Email','contactEmail'],
         ['Date Shown in Letter','sentDate'],['Google Sheet ID','sheetId']].map(([lbl,key])=>`
      <div style="margin-bottom:9px">
        <div style="font-size:9px;color:#6e7681;margin-bottom:3px">${lbl}</div>
        <input class="ifield" type="text" value="${(e[key]||'').replace(/"/g,'&quot;')}" oninput="S.event['${key}']=this.value;S.unsaved=true">
      </div>`).join('')}
    </div>

    <div class="sl">IMAGES</div>
    <div style="background:#1a1200;border:1px solid #C8A84B;border-radius:5px;padding:9px 12px;margin-bottom:10px;font-size:10px;color:#C8A84B;line-height:1.6">
      <strong>Architecture:</strong> The email template uses named tokens (<code>__IMG_EMBLEM__</code> etc.) —
      keeping template HTML readable. Images below are injected at send/preview time.<br>
      <strong>Google Drive images</strong> must be shared <em>"Anyone with link (Viewer)"</em> to load in
      recipients' email clients. For production, use a Direct URL pointing to your hosted image.
    </div>
    ${imgDefs.map(({key,label,hint}) => {
      const modeKey = 'img'+key+'Mode', urlKey = 'img'+key+'Url';
      const mode = e[modeKey]||'embedded', url = e[urlKey]||'';
      return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div><span style="font-size:11px;color:#f0f6fc">${label}</span> <span style="font-size:9px;color:#6e7681">${hint}</span></div>
          <button class="btn sm" onclick="syncImageOverrides();testImg('${key.toUpperCase()}')">Test</button>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:7px">
          ${['embedded','gdrive','url'].map(m=>`<button class="cat${mode===m?' on':''}" onclick="S.event['${modeKey}']='${m}';S.unsaved=true;syncImageOverrides();render()">${ml[m]}</button>`).join('')}
        </div>
        ${mode==='embedded'
          ? `<div style="font-size:10px;color:#6e7681">Using embedded base64 — token: <code style="color:#C8A84B">__IMG_${key.toUpperCase()}__</code>. Works offline, no dependencies.</div>`
          : mode==='gdrive'
          ? `<div style="font-size:9px;color:#8b949e;margin-bottom:4px">drive.google.com/file/d/<strong style="color:#C8A84B">FILE_ID</strong>/view</div>
             <input class="ifield" type="text" placeholder="Paste file ID" value="${url.replace(/"/g,'&quot;')}" oninput="S.event['${urlKey}']=this.value;S.unsaved=true;syncImageOverrides()">
             ${url?`<div style="font-size:9px;color:#6e7681;margin-top:3px">→ drive.google.com/uc?export=view&id=${url}</div>`:''}`
          : `<input class="ifield" type="text" placeholder="https://example.org/images/image.png" value="${url.replace(/"/g,'&quot;')}" oninput="S.event['${urlKey}']=this.value;S.unsaved=true;syncImageOverrides()">`}
      </div>`;
    }).join('')}
    <button class="btn gold" onclick="openFullPreview()">▶ Preview Invite with Current Settings</button>
  </div>`;
}

// ─── Tab: Invitees ────────────────────────────────────────────────────────────
function renderInvitees() {
  return `<div style="padding:14px 20px">
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:11px;color:#f0f6fc">${S.invitees.length} invitees</span>
      <div style="display:flex;gap:5px;margin-left:auto;flex-wrap:wrap">
        <button class="btn sm gold" onclick="S.modal='researcher';render()">⬡ From Researcher</button>
        <button class="btn sm pri" onclick="triggerFile(importCSV,'.csv')">↑ CSV</button>
        <button class="btn sm" onclick="S.modal='add';render()">＋ Manual</button>
        <button class="btn sm stop" onclick="if(confirm('Clear ALL invitees?')){S.invitees=[];S.unsaved=true;render();}">Clear</button>
      </div>
    </div>
    ${S.invitees.length===0?`
    <div style="text-align:center;padding:40px;color:#30363d">
      <div style="font-size:28px;margin-bottom:10px">📋</div>
      <div style="font-size:11px;margin-bottom:4px">No invitees in this session</div>
      <div style="font-size:10px">Import from VIP Researcher, upload CSV, or add manually.</div>
    </div>`:''}
    ${S.invitees.map((inv,idx) => `
    <div style="display:grid;grid-template-columns:1fr 160px 78px 22px;gap:6px;padding:7px 0;border-bottom:1px solid #0d1117;align-items:center">
      <div>
        <div style="font-size:11px;color:#f0f6fc">${inv.name}</div>
        <div style="font-size:9px;color:#6e7681">${inv.title||''}${inv.category?' · '+inv.category:''}</div>
      </div>
      <input class="ifield" type="text" value="${(inv.email||'').replace(/"/g,'&quot;')}" placeholder="email"
        oninput="S.invitees[${idx}].email=this.value;S.unsaved=true" style="font-size:9px;padding:3px 7px">
      <span class="tag" style="${its(inv.inviteStatus)};font-size:8px">${IL[inv.inviteStatus]||'NOT SENT'}</span>
      <button class="btn sm stop" onclick="S.invitees.splice(${idx},1);S.unsaved=true;render()" style="padding:2px 5px">✕</button>
    </div>`).join('')}
    ${S.invitees.length>0?`<div style="padding:9px 0;font-size:10px;color:#6e7681">${S.invitees.filter(i=>!i.email).length} missing email · ${S.invitees.filter(i=>i.inviteStatus==='sent').length} sent</div>`:''}
  </div>`;
}

// ─── Full-screen preview (settings or standalone) ─────────────────────────────
function openFullPreview() {
  S.modal = 'fullpreview'; render();
  requestAnimationFrame(() => {
    writePreview(buildEmail('Sample','Official'), 'full-preview-frame');
  });
}

// ─── Modals ───────────────────────────────────────────────────────────────────
function renderModal() {
  if (!S.modal) return '';

  if (S.modal === 'new') return `
  <div class="modal-bg" onclick="S.modal=null;render()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:13px;color:#f0f6fc;margin-bottom:10px">Start New Event</div>
    <p style="font-size:11px;color:#8b949e;line-height:1.6;margin-bottom:14px">This resets the current session. <strong style="color:#e3b341">Save your current profile first if you have unsaved work.</strong></p>
    <button class="btn gold" onclick="exportProfile()">↓ Save Current Profile</button>
    <button class="btn stop" style="margin-left:8px" onclick="S.event={...DEFAULT_EVENT};S.invitees=[];syncImageOverrides();S.unsaved=false;S.modal=null;log('New event started.');render()">Reset & Start Fresh</button>
    <button class="btn sm" style="margin-left:8px" onclick="S.modal=null;render()">Cancel</button>
  </div></div>`;

  if (S.modal === 'researcher') return `
  <div class="modal-bg" onclick="S.modal=null;render()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:13px;color:#f0f6fc;margin-bottom:10px">⬡ Import from VIP Researcher</div>
    <p style="font-size:11px;color:#8b949e;line-height:1.7;margin-bottom:14px">
      In VIP Researcher, click <strong style="color:#3fb950">⬡ Export → Mailer</strong> after verifying officials, then load that <code style="color:#C8A84B">vip-invitees-YYYY-MM-DD.json</code> here.<br><br>
      <strong style="color:#f0f6fc">Merge rules:</strong> New officials added as NOT SENT · Existing names get email refreshed, invite status preserved · Left-office officials excluded.
    </p>
    <button class="btn pri" onclick="triggerFile(importResearcher,'.json')">↑ Choose File</button>
    <button class="btn sm" style="margin-left:8px" onclick="S.modal=null;render()">Cancel</button>
  </div></div>`;

  if (S.modal === 'add') return `
  <div class="modal-bg" onclick="S.modal=null;render()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:13px;color:#f0f6fc;margin-bottom:14px">Add Invitee Manually</div>
    ${[['Full Name *','m_name','Firstname Lastname'],['Title','m_title','e.g. US Representative'],['Email','m_email','scheduler@example.gov'],['Category','m_cat','e.g. US House']].map(([l,id,ph])=>`
    <div style="margin-bottom:9px"><div style="font-size:9px;color:#6e7681;margin-bottom:3px">${l}</div><input id="${id}" class="ifield" type="text" placeholder="${ph}"></div>`).join('')}
    <button class="btn pri" onclick="
      const n=document.getElementById('m_name').value.trim();
      if(!n){alert('Name required');return;}
      S.invitees.push({name:n,title:document.getElementById('m_title').value.trim(),
        email:document.getElementById('m_email').value.trim(),
        category:document.getElementById('m_cat').value.trim(),
        inviteStatus:'not_sent',sentAt:'',notes:''});
      S.unsaved=true;S.modal=null;log('+ Added '+n);render();">Add</button>
    <button class="btn sm" style="margin-left:8px" onclick="S.modal=null;render()">Cancel</button>
  </div></div>`;

  if (S.modal === 'fullpreview') return `
  <div class="modal-bg" style="padding:0;align-items:stretch" onclick="S.modal=null;render()">
  <div style="display:flex;flex-direction:column;width:100%;max-width:780px;margin:0 auto;background:#0d1117;height:100vh" onclick="event.stopPropagation()">
    <div style="background:#080c10;padding:9px 16px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span style="font-size:11px;color:#f0f6fc">Invite Preview — "Honorable Sample Official"</span>
      <span style="font-size:10px;color:#6e7681;margin-left:6px">using current image + event settings</span>
      <button class="btn sm" style="margin-left:auto" onclick="S.modal=null;render()">✕ Close</button>
    </div>
    <iframe id="full-preview-frame" style="flex:1;border:none;background:#fff"></iframe>
  </div></div>`;

  return '';
}

window.addEventListener('beforeunload', e => { if (S.unsaved) { e.preventDefault(); e.returnValue=''; } });

render();
</script>
</body>
</html>
