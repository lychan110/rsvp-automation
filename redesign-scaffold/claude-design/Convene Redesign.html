<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convene · Invitation Suite Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Shared canvas */
    --canvas-bg: #ece7df;
    --canvas-grid: rgba(40, 30, 20, 0.04);

    /* Atelier (warm letterpress) */
    --a-paper: #f4ede0;
    --a-paper-2: #ebe2d1;
    --a-ink: #1a1612;
    --a-ink-2: #3a322a;
    --a-ink-3: #6b5d4d;
    --a-rule: #d6c9b3;
    --a-accent: #c8553d;
    --a-accent-deep: #9b3a26;
    --a-gold: #b8860b;
    --a-cream: #fffbf2;

    /* Roster (data-dense neutral) */
    --r-bg: #f7f4ee;
    --r-surface: #ffffff;
    --r-rule: #e7e1d4;
    --r-rule-2: #d8cfbb;
    --r-ink: #14110d;
    --r-ink-2: #4a4339;
    --r-ink-3: #8a8170;
    --r-accent: #c8553d;
    --r-good: #4f7a4a;
    --r-warn: #b8860b;
    --r-bad: #a14237;

    /* Roster dark */
    --rd-bg: #14110d;
    --rd-surface: #1c1814;
    --rd-rule: #2c2620;
    --rd-rule-2: #3d342c;
    --rd-ink: #f4ede0;
    --rd-ink-2: #c8bda9;
    --rd-ink-3: #8a8170;

    /* Salon (editorial) */
    --s-bg: #f0e9da;
    --s-paper: #faf6ec;
    --s-ink: #1a1612;
    --s-ink-2: #4a4339;
    --s-ink-3: #8a8170;
    --s-rule: #ddd2bc;
    --s-accent: #c8553d;
    --s-blush: #e8c5b4;
    --s-sage: #a8b89a;
    --s-sky: #b8cfd6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: 'Geist', system-ui, -apple-system, sans-serif;
    background: var(--canvas-bg);
    color: var(--a-ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Subtle paper texture for canvas */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200, 85, 61, 0.025) 0, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(184, 134, 11, 0.025) 0, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; height: 100%; }

  .serif { font-family: 'Fraunces', 'Times New Roman', serif; }
  .display { font-family: 'Instrument Serif', 'Times New Roman', serif; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  /* Phone artboard wrapper — removes design canvas frame chrome we don't want */
  .phone-shell {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Hide default design-canvas frame around our phone artboards */
  .dc-no-frame {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  /* Scrollable phone screens */
  .scr {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .scr::-webkit-scrollbar { width: 0; }

  /* Tap target */
  .tap { min-height: 44px; }

  /* Shared button reset */
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font: inherit; color: inherit; }
  input:focus, textarea:focus, button:focus-visible {
    outline: 2px solid var(--a-accent);
    outline-offset: 2px;
  }

  /* Letterpress decoration utility */
  .deboss { text-shadow: 0 1px 0 rgba(255,255,255,0.4); }

  /* Ticker animation */
  @keyframes scan-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }
  .scanning { animation: scan-pulse 1.4s ease-in-out infinite; }
  @keyframes rosterPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  @keyframes ink-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.5; }
  }
  .ink-dot { animation: ink-pulse 1.6s ease-in-out infinite; }

  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  /* Typography helpers */
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Stamp / chip */
  .stamp {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border: 1px solid currentColor;
    border-radius: 99px;
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  /* Wax seal-like dot */
  .seal {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* Decorative rule */
  .ornament {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--a-ink-3);
  }
  .ornament::before, .ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: currentColor;
    opacity: 0.4;
  }

  /* Common iPhone bezel */
  .iphone-bezel {
    width: 375px;
    height: 740px;
    background: #1a1612;
    border-radius: 44px;
    padding: 10px;
    box-shadow:
      0 0 0 2px #2a2520,
      0 30px 60px -20px rgba(0,0,0,0.35),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
  }
  .iphone-screen {
    width: 100%;
    height: 100%;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
  }
  .iphone-notch {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #1a1612;
    border-radius: 99px;
    z-index: 50;
  }

  /* Status bar — appears INSIDE iphone-screen, above .scr content */
  .ios-statusbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 600;
    z-index: 40;
    pointer-events: none;
  }
  .ios-statusbar .right { display: flex; gap: 5px; align-items: center; }
  .ios-home {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 5px;
    border-radius: 99px;
    z-index: 40;
  }

  /* Tweaks toggle hidden state */
  .tweaks-hidden { display: none; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="atelier.jsx"></script>
  <script type="text/babel" src="roster.jsx"></script>
  <script type="text/babel" src="salon.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
